name: Update Supported Devices

on:
  schedule:
    - cron: '0 0 */3 * *' # Раз в три дня в полночь
  workflow_dispatch: # Возможность запустить вручную

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download latest ToH data
        run: |
          # Актуальный дамп ToH (старый .json.gz в _media удалён с wiki)
          curl -fSL "https://openwrt.org/toh.json" -o toh.json

      - name: Process data
        run: python process_data.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add supported_devices.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update supported devices database" && git push)
